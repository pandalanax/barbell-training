<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbell Training</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.5rem;
    }

    .settings-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px;
    }

    .settings-btn:hover {
      color: #eee;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: #16213e;
      color: #888;
      font-size: 1rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .tab.active {
      background: #0f3460;
      color: #fff;
    }

    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .weight-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .weight-value {
      font-size: 2rem;
      font-weight: bold;
    }

    .weight-controls {
      display: flex;
      gap: 8px;
    }

    .weight-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: #0f3460;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      border-radius: 8px;
    }

    .weight-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .section-title {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .warmup-list {
      list-style: none;
    }

    .warmup-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #0f3460;
    }

    .warmup-item:last-child {
      border-bottom: none;
    }

    .warmup-weight {
      font-weight: 600;
    }

    .warmup-plates {
      color: #888;
      font-size: 0.9rem;
    }

    .warmup-reps {
      color: #e94560;
    }

    .working-set {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #0f3460;
    }

    .working-set:last-child {
      border-bottom: none;
    }

    .set-checkbox {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: #e94560;
    }

    .set-label {
      font-size: 1.1rem;
    }

    .set-complete {
      text-decoration: line-through;
      color: #888;
    }

    .progress-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 8px;
    }

    .progress-btn:hover {
      background: #ff6b6b;
    }

    .keep-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid #888;
      background: transparent;
      color: #888;
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 8px;
    }

    .keep-btn:hover {
      border-color: #eee;
      color: #eee;
    }

    .chart-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 0.85rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    #history-chart {
      width: 100%;
      height: 200px;
    }

    .history-empty {
      color: #888;
      font-style: italic;
      text-align: center;
      padding: 40px 0;
    }

    .plates-info {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #0f3460;
      font-size: 0.9rem;
      color: #888;
    }

    .plates-info strong {
      color: #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Barbell Training</h1>
      <button class="settings-btn" onclick="location.href='settings.html'">&#9881;</button>
    </header>

    <div class="tabs">
      <button class="tab active" data-exercise="squat">Squat</button>
      <button class="tab" data-exercise="press">Press</button>
      <button class="tab" data-exercise="deadlift">Deadlift</button>
    </div>

    <div class="card">
      <div class="section-title">Working Weight</div>
      <div class="weight-display">
        <span class="weight-value" id="working-weight">40kg</span>
        <div class="weight-controls">
          <button class="weight-btn" id="decrease-btn">−</button>
          <button class="weight-btn" id="increase-btn">+</button>
        </div>
      </div>
      <div class="plates-info" id="working-plates"></div>
    </div>

    <div class="card">
      <div class="section-title">Warmup</div>
      <ul class="warmup-list" id="warmup-list"></ul>
    </div>

    <div class="card">
      <div class="section-title">Working Sets (<span id="working-weight-sets"></span>)</div>
      <div id="working-sets"></div>
      <button class="progress-btn" id="progress-btn" style="display: none;">
        Increase Weight
      </button>
      <button class="keep-btn" id="keep-btn" style="display: none;">
        Keep Same Weight
      </button>
    </div>

    <div class="card">
      <div class="section-title">History</div>
      <div class="chart-legend" id="chart-legend"></div>
      <canvas id="history-chart" width="368" height="200"></canvas>
      <div id="history-empty" class="history-empty" style="display: none;">No workouts logged yet</div>
    </div>
  </div>

  <script>
    const DEFAULT_SETTINGS = {
      plates: [10, 5, 2.5, 2.5, 1.25],
      exercises: {
        squat: { startingWeight: 20, progression: 5 },
        press: { startingWeight: 10, progression: 2.5 },
        deadlift: { startingWeight: 30, progression: 5 }
      }
    };

    let settings = null;
    let currentExercise = 'squat';
    let completedSets = [false, false, false];
    let data = null;
    let history = [];

    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        history = await res.json();
      } catch (e) {
        // Fallback to localStorage if server unavailable
        const saved = localStorage.getItem('barbell-history');
        history = saved ? JSON.parse(saved) : [];
      }
    }

    async function saveHistory() {
      try {
        await fetch('/api/history', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(history)
        });
      } catch (e) {
        // Fallback to localStorage if server unavailable
        localStorage.setItem('barbell-history', JSON.stringify(history));
      }
    }

    async function logWorkout(exercise, weight) {
      history.unshift({
        exercise,
        weight,
        date: new Date().toISOString()
      });
      // Keep last 50 entries
      if (history.length > 50) {
        history = history.slice(0, 50);
      }
      await saveHistory();
    }

    const EXERCISE_COLORS = {
      squat: '#e94560',
      press: '#4ecdc4',
      deadlift: '#ffe66d'
    };

    function drawChart() {
      const canvas = document.getElementById('history-chart');
      const ctx = canvas.getContext('2d');
      const legend = document.getElementById('chart-legend');
      const emptyMsg = document.getElementById('history-empty');

      // Set actual canvas size for sharp rendering
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;

      // Clear canvas
      ctx.clearRect(0, 0, width, height);

      if (history.length === 0) {
        canvas.style.display = 'none';
        legend.style.display = 'none';
        emptyMsg.style.display = 'block';
        return;
      }

      canvas.style.display = 'block';
      legend.style.display = 'flex';
      emptyMsg.style.display = 'none';

      // Group history by exercise
      const byExercise = { squat: [], press: [], deadlift: [] };
      history.forEach(entry => {
        byExercise[entry.exercise].push({
          date: new Date(entry.date),
          weight: entry.weight
        });
      });

      // Reverse so oldest is first (for drawing left to right)
      Object.keys(byExercise).forEach(ex => byExercise[ex].reverse());

      // Find date range and weight range
      const allDates = history.map(e => new Date(e.date));
      const allWeights = history.map(e => e.weight);
      const minDate = Math.min(...allDates);
      const maxDate = Math.max(...allDates);
      const minWeight = Math.min(...allWeights) - 5;
      const maxWeight = Math.max(...allWeights) + 5;

      const padding = { top: 10, right: 10, bottom: 25, left: 40 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      // Draw axes
      ctx.strokeStyle = '#0f3460';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, height - padding.bottom);
      ctx.lineTo(width - padding.right, height - padding.bottom);
      ctx.stroke();

      // Draw Y axis labels
      ctx.fillStyle = '#888';
      ctx.font = '11px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      const ySteps = 4;
      for (let i = 0; i <= ySteps; i++) {
        const weight = minWeight + (maxWeight - minWeight) * (i / ySteps);
        const y = height - padding.bottom - (chartHeight * i / ySteps);
        ctx.fillText(Math.round(weight) + 'kg', padding.left - 5, y + 4);

        // Grid line
        ctx.strokeStyle = '#0f3460';
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();
      }

      // Helper to convert data to canvas coordinates
      const dateRange = maxDate - minDate || 1;
      const weightRange = maxWeight - minWeight || 1;
      const toX = date => padding.left + ((date - minDate) / dateRange) * chartWidth;
      const toY = weight => height - padding.bottom - ((weight - minWeight) / weightRange) * chartHeight;

      // Format date as YYYY-MM-DD
      const formatDate = (date) => {
        const d = new Date(date);
        return d.toISOString().split('T')[0];
      };

      // Draw X axis date labels
      ctx.fillStyle = '#888';
      ctx.font = '10px -apple-system, sans-serif';
      ctx.textAlign = 'center';

      // Get unique dates and show up to 5 labels
      const uniqueDates = [...new Set(history.map(e => formatDate(e.date)))].sort();
      const dateCount = uniqueDates.length;
      const step = Math.max(1, Math.floor(dateCount / 4));

      for (let i = 0; i < dateCount; i += step) {
        const dateStr = uniqueDates[i];
        const date = new Date(dateStr);
        const x = toX(date);
        ctx.fillText(dateStr, x, height - 8);
      }
      // Always show last date
      if (dateCount > 1) {
        const lastDate = uniqueDates[dateCount - 1];
        const x = toX(new Date(lastDate));
        ctx.fillText(lastDate, x, height - 8);
      }

      // Draw lines and points for each exercise
      Object.keys(byExercise).forEach(exercise => {
        const points = byExercise[exercise];
        if (points.length === 0) return;

        const color = EXERCISE_COLORS[exercise];
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 2;

        // Draw line
        ctx.beginPath();
        points.forEach((point, i) => {
          const x = toX(point.date);
          const y = toY(point.weight);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Draw points
        points.forEach(point => {
          const x = toX(point.date);
          const y = toY(point.weight);
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fill();
        });
      });

      // Render legend
      legend.innerHTML = Object.keys(EXERCISE_COLORS).map(ex => `
        <div class="legend-item">
          <span class="legend-dot" style="background: ${EXERCISE_COLORS[ex]}"></span>
          <span>${ex.charAt(0).toUpperCase() + ex.slice(1)}</span>
        </div>
      `).join('');
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        return await res.json();
      } catch (e) {
        return DEFAULT_SETTINGS;
      }
    }

    async function loadProgress() {
      try {
        const res = await fetch('/api/progress');
        return await res.json();
      } catch (e) {
        return {
          squat: { weight: settings.exercises.squat.startingWeight },
          press: { weight: settings.exercises.press.startingWeight },
          deadlift: { weight: settings.exercises.deadlift.startingWeight }
        };
      }
    }

    async function saveProgress() {
      try {
        await fetch('/api/progress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
      } catch (e) {
        console.error('Failed to save progress');
      }
    }

    function calculatePlates(targetWeight) {
      const weightPerSide = targetWeight / 2;
      if (weightPerSide < 0) return null;
      if (weightPerSide === 0) return [];

      const plates = [];
      let remaining = weightPerSide;
      const available = [...settings.plates];

      for (let i = 0; i < available.length; i++) {
        if (available[i] <= remaining + 0.001) {
          plates.push(available[i]);
          remaining -= available[i];
        }
      }

      if (Math.abs(remaining) > 0.001) return null;
      return plates;
    }

    function roundDownToAchievable(weight) {
      if (weight <= 0) return 0;

      // Find smallest plate to determine step size
      const smallestPlate = Math.min(...settings.plates);
      const step = smallestPlate * 2; // Both sides

      // Align to step increments
      let aligned = Math.floor(weight / step) * step;

      for (let w = aligned; w >= 0; w -= step) {
        w = Math.round(w * 100) / 100; // Round to avoid floating point issues
        if (w === 0 || calculatePlates(w) !== null) {
          return w;
        }
      }
      return 0;
    }

    function formatPlates(plates) {
      if (!plates || plates.length === 0) return 'no plates';
      return plates.join(' + ');
    }

    function generateWarmup(workingWeight) {
      const warmup = [
        { weight: 0, reps: 5, emptyBar: true },
        { weight: 0, reps: 5, emptyBar: true },
        { weight: roundDownToAchievable(workingWeight * 0.4), reps: 5 },
        { weight: roundDownToAchievable(workingWeight * 0.6), reps: 3 },
        { weight: roundDownToAchievable(workingWeight * 0.8), reps: 2 }
      ];
      return warmup;
    }

    function render() {
      const weight = data[currentExercise].weight;

      // Update tabs
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.exercise === currentExercise);
      });

      // Update working weight display
      document.getElementById('working-weight').textContent = `${weight}kg`;
      document.getElementById('working-weight-sets').textContent = `${weight}kg`;

      // Update working plates info
      const workingPlates = calculatePlates(weight);
      const platesInfo = document.getElementById('working-plates');
      if (workingPlates) {
        platesInfo.innerHTML = `<strong>Per side:</strong> ${formatPlates(workingPlates)}`;
      }

      // Update buttons state
      const increment = settings.exercises[currentExercise].progression;
      const nextWeight = weight + increment;
      const prevWeight = weight - increment;
      const smallestPlate = Math.min(...settings.plates);
      const minWeight = smallestPlate * 2;
      document.getElementById('increase-btn').disabled = calculatePlates(nextWeight) === null;
      document.getElementById('decrease-btn').disabled = prevWeight < minWeight;

      // Render warmup
      const warmupList = document.getElementById('warmup-list');
      const warmup = generateWarmup(weight);
      warmupList.innerHTML = warmup.map((set, i) => {
        if (set.emptyBar) {
          return `
            <li class="warmup-item">
              <div>
                <span class="warmup-weight">Empty bar</span>
              </div>
              <span class="warmup-reps">× ${set.reps}</span>
            </li>
          `;
        }
        const plates = calculatePlates(set.weight);
        return `
          <li class="warmup-item">
            <div>
              <span class="warmup-weight">${set.weight}kg</span>
              <span class="warmup-plates">(${formatPlates(plates)})</span>
            </div>
            <span class="warmup-reps">× ${set.reps}</span>
          </li>
        `;
      }).join('');

      // Render working sets
      const workingSets = document.getElementById('working-sets');
      const numSets = currentExercise === 'deadlift' ? 1 : 3;
      const setNums = Array.from({ length: numSets }, (_, i) => i + 1);
      workingSets.innerHTML = setNums.map((num, i) => `
        <div class="working-set">
          <input type="checkbox" class="set-checkbox" data-set="${i}"
            ${completedSets[i] ? 'checked' : ''}>
          <span class="set-label ${completedSets[i] ? 'set-complete' : ''}">
            Set ${num}: 5 reps
          </span>
        </div>
      `).join('');

      // Progress buttons
      const requiredSets = currentExercise === 'deadlift' ? 1 : 3;
      const allComplete = completedSets.slice(0, requiredSets).every(s => s);
      const progressBtn = document.getElementById('progress-btn');
      const keepBtn = document.getElementById('keep-btn');
      const nextWeightValue = weight + settings.exercises[currentExercise].progression;
      if (allComplete) {
        if (calculatePlates(nextWeightValue) !== null) {
          progressBtn.style.display = 'block';
          progressBtn.textContent = `Increase to ${nextWeightValue}kg`;
        } else {
          progressBtn.style.display = 'none';
        }
        keepBtn.style.display = 'block';
      } else {
        progressBtn.style.display = 'none';
        keepBtn.style.display = 'none';
      }

      // Render history chart
      drawChart();
    }

    // Event listeners
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        currentExercise = tab.dataset.exercise;
        completedSets = [false, false, false];
        render();
      });
    });

    document.getElementById('increase-btn').addEventListener('click', async () => {
      const increment = settings.exercises[currentExercise].progression;
      const newWeight = data[currentExercise].weight + increment;
      if (calculatePlates(newWeight) !== null) {
        data[currentExercise].weight = newWeight;
        completedSets = [false, false, false];
        await saveProgress();
        render();
      }
    });

    document.getElementById('decrease-btn').addEventListener('click', async () => {
      const increment = settings.exercises[currentExercise].progression;
      const newWeight = data[currentExercise].weight - increment;
      const smallestPlate = Math.min(...settings.plates);
      const minWeight = smallestPlate * 2;
      if (newWeight >= minWeight) {
        data[currentExercise].weight = newWeight;
        completedSets = [false, false, false];
        await saveProgress();
        render();
      }
    });

    document.getElementById('working-sets').addEventListener('change', (e) => {
      if (e.target.classList.contains('set-checkbox')) {
        const setIndex = parseInt(e.target.dataset.set);
        completedSets[setIndex] = e.target.checked;
        render();
      }
    });

    document.getElementById('progress-btn').addEventListener('click', async () => {
      const currentWeight = data[currentExercise].weight;
      await logWorkout(currentExercise, currentWeight);

      const increment = settings.exercises[currentExercise].progression;
      const newWeight = currentWeight + increment;
      if (calculatePlates(newWeight) !== null) {
        data[currentExercise].weight = newWeight;
        completedSets = [false, false, false];
        await saveProgress();
        render();
      }
    });

    document.getElementById('keep-btn').addEventListener('click', async () => {
      await logWorkout(currentExercise, data[currentExercise].weight);
      completedSets = [false, false, false];
      render();
    });

    // Reload data when returning from settings page
    async function reloadAndRender() {
      settings = await loadSettings();
      data = await loadProgress();
      await loadHistory();
      render();
    }

    window.addEventListener('pageshow', reloadAndRender);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        reloadAndRender();
      }
    });

    // Initial load and render
    (async () => {
      settings = await loadSettings();
      data = await loadProgress();
      await loadHistory();
      render();
    })();
  </script>
</body>
</html>
