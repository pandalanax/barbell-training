<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Barbell Training</title>
  <script src="themes.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --card-bg: #16213e;
      --card-bg-active: #0f3460;
      --text-primary: #eee;
      --text-secondary: #888;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
      --border: #0f3460;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px;
    }

    h1 {
      font-size: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 1rem;
      border-radius: 8px;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    .plates-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .plate-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card-bg-active);
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .plate-remove {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }

    .add-plate {
      display: flex;
      gap: 8px;
    }

    .add-plate input {
      flex: 1;
    }

    .add-btn {
      padding: 12px 20px;
      border: none;
      background: var(--card-bg-active);
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      border-radius: 8px;
    }

    .exercise-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      align-items: end;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .exercise-row:last-child {
      border-bottom: none;
    }

    .exercise-name {
      font-weight: 600;
      align-self: center;
    }

    .exercise-row input {
      padding: 10px;
    }

    .exercise-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .save-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: var(--accent);
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
    }

    .save-btn:hover {
      background: var(--accent-hover);
    }

    .reset-btn {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 1rem;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 12px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg-active);
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .toast.show {
      opacity: 1;
    }

    /* Theme selector styles */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .theme-option {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .theme-option.active {
      border-color: var(--accent);
    }

    .theme-option:hover {
      border-color: var(--text-secondary);
    }

    .theme-option.active:hover {
      border-color: var(--accent);
    }

    .theme-preview {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .theme-preview-bar {
      height: 8px;
      border-radius: 4px;
    }

    .theme-preview-row {
      display: flex;
      gap: 4px;
    }

    .theme-preview-box {
      height: 16px;
      flex: 1;
      border-radius: 4px;
    }

    .theme-label {
      padding: 6px 8px;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button class="back-btn" onclick="location.href='index.html'">&larr;</button>
      <h1>Settings</h1>
    </header>

    <div class="card">
      <div class="section-title">Theme</div>
      <div class="theme-grid" id="theme-grid"></div>
    </div>

    <div class="card">
      <div class="section-title">Available Plates (per side)</div>
      <div class="plates-list" id="plates-list"></div>
      <div class="add-plate">
        <input type="number" id="new-plate" step="0.25" min="0.25" placeholder="Weight (kg)">
        <button class="add-btn" id="add-plate-btn">Add</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Rest Timer</div>
      <div class="form-group">
        <label for="rest-timer">Rest between sets (seconds)</label>
        <input type="number" id="rest-timer" step="15" min="30" max="600">
      </div>
    </div>

    <div class="card">
      <div class="section-title">Exercises</div>
      <div class="exercise-header">
        <span>Exercise</span>
        <span>Current (kg)</span>
        <span>Progress (kg)</span>
      </div>
      <div class="exercise-row">
        <span class="exercise-name">Squat</span>
        <input type="number" id="squat-start" step="2.5" min="0">
        <input type="number" id="squat-progress" step="0.5" min="0.5">
      </div>
      <div class="exercise-row">
        <span class="exercise-name">Press</span>
        <input type="number" id="press-start" step="2.5" min="0">
        <input type="number" id="press-progress" step="0.5" min="0.5">
      </div>
      <div class="exercise-row">
        <span class="exercise-name">Deadlift</span>
        <input type="number" id="deadlift-start" step="2.5" min="0">
        <input type="number" id="deadlift-progress" step="0.5" min="0.5">
      </div>
      <div class="exercise-row">
        <span class="exercise-name">Row</span>
        <input type="number" id="row-start" step="2.5" min="0">
        <input type="number" id="row-progress" step="0.5" min="0.5">
      </div>
    </div>

    <button class="save-btn" id="save-btn">Save Settings</button>
    <button class="reset-btn" id="reset-progress-btn">Reset Progress to Current Field Values</button>
    <button class="reset-btn" id="reset-btn">Reset Settings to Defaults</button>
  </div>

  <div class="toast" id="toast">Settings saved!</div>

  <script>
    const DEFAULT_SETTINGS = {
      plates: [10, 5, 2.5, 2.5, 1.25],
      restTimer: 180,
      theme: 'dark-blue',
      exercises: {
        squat: { startingWeight: 20, progression: 5 },
        press: { startingWeight: 10, progression: 2.5 },
        deadlift: { startingWeight: 30, progression: 5 },
        row: { startingWeight: 30, progression: 5 }
      }
    };

    let settings = DEFAULT_SETTINGS;
    let progress = null;
    let plates = [];
    let currentTheme = 'dark-blue';

    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        settings = await res.json();
      } catch (e) {
        settings = { ...DEFAULT_SETTINGS };
      }
      plates = [...settings.plates];
    }

    async function loadProgress() {
      try {
        const res = await fetch('/api/progress');
        progress = await res.json();
      } catch (e) {
        progress = null;
      }
    }

    async function saveSettings() {
      try {
        await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(settings)
        });
      } catch (e) {
        console.error('Failed to save settings');
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function renderPlates() {
      const list = document.getElementById('plates-list');
      list.innerHTML = plates
        .map((p, i) => `
          <span class="plate-tag">
            ${p}kg
            <button class="plate-remove" data-index="${i}">&times;</button>
          </span>
        `).join('');
    }

    function renderThemes() {
      const grid = document.getElementById('theme-grid');
      grid.innerHTML = Object.entries(THEMES).map(([id, theme]) => {
        const c = theme.colors;
        const isActive = currentTheme === id;
        return `
          <div class="theme-option ${isActive ? 'active' : ''}" data-theme="${id}">
            <div class="theme-preview" style="background: ${c['--bg']}">
              <div class="theme-preview-row">
                <div class="theme-preview-box" style="background: ${c['--card-bg-active']}"></div>
                <div class="theme-preview-box" style="background: ${c['--card-bg']}"></div>
                <div class="theme-preview-box" style="background: ${c['--card-bg']}"></div>
              </div>
              <div class="theme-preview-bar" style="background: ${c['--card-bg']}"></div>
              <div class="theme-preview-bar" style="background: ${c['--accent']}; width: 60%"></div>
            </div>
            <div class="theme-label" style="background: ${c['--card-bg']}; color: ${c['--text-primary']}">${theme.name}</div>
          </div>
        `;
      }).join('');
    }

    function populateForm() {
      // Show current progress weights as starting weights if available
      const sqWeight = progress ? progress.squat.weight : settings.exercises.squat.startingWeight;
      const prWeight = progress ? progress.press.weight : settings.exercises.press.startingWeight;
      const dlWeight = progress ? progress.deadlift.weight : settings.exercises.deadlift.startingWeight;
      const rowWeight = progress && progress.row ? progress.row.weight : settings.exercises.row.startingWeight;
      document.getElementById('squat-start').value = sqWeight;
      document.getElementById('squat-progress').value = settings.exercises.squat.progression;
      document.getElementById('press-start').value = prWeight;
      document.getElementById('press-progress').value = settings.exercises.press.progression;
      document.getElementById('deadlift-start').value = dlWeight;
      document.getElementById('deadlift-progress').value = settings.exercises.deadlift.progression;
      document.getElementById('row-start').value = rowWeight;
      document.getElementById('row-progress').value = settings.exercises.row.progression;
      document.getElementById('rest-timer').value = settings.restTimer || 180;
      plates = [...settings.plates];
      currentTheme = settings.theme || 'dark-blue';
      renderPlates();
      renderThemes();
    }

    // Event listeners
    document.getElementById('theme-grid').addEventListener('click', (e) => {
      const themeOption = e.target.closest('.theme-option');
      if (themeOption) {
        currentTheme = themeOption.dataset.theme;
        applyTheme(currentTheme);
        renderThemes();
      }
    });

    document.getElementById('plates-list').addEventListener('click', (e) => {
      if (e.target.classList.contains('plate-remove')) {
        const index = parseInt(e.target.dataset.index);
        plates.splice(index, 1);
        renderPlates();
      }
    });

    document.getElementById('add-plate-btn').addEventListener('click', () => {
      const input = document.getElementById('new-plate');
      const value = parseFloat(input.value);
      if (value > 0) {
        plates.push(value);
        plates.sort((a, b) => b - a);
        renderPlates();
        input.value = '';
      }
    });

    document.getElementById('new-plate').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('add-plate-btn').click();
      }
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      settings = {
        plates: [...plates],
        restTimer: parseInt(document.getElementById('rest-timer').value) || 180,
        theme: currentTheme,
        exercises: {
          squat: {
            startingWeight: parseFloat(document.getElementById('squat-start').value) || DEFAULT_SETTINGS.exercises.squat.startingWeight,
            progression: parseFloat(document.getElementById('squat-progress').value) || DEFAULT_SETTINGS.exercises.squat.progression
          },
          press: {
            startingWeight: parseFloat(document.getElementById('press-start').value) || DEFAULT_SETTINGS.exercises.press.startingWeight,
            progression: parseFloat(document.getElementById('press-progress').value) || DEFAULT_SETTINGS.exercises.press.progression
          },
          deadlift: {
            startingWeight: parseFloat(document.getElementById('deadlift-start').value) || DEFAULT_SETTINGS.exercises.deadlift.startingWeight,
            progression: parseFloat(document.getElementById('deadlift-progress').value) || DEFAULT_SETTINGS.exercises.deadlift.progression
          },
          row: {
            startingWeight: parseFloat(document.getElementById('row-start').value) || DEFAULT_SETTINGS.exercises.row.startingWeight,
            progression: parseFloat(document.getElementById('row-progress').value) || DEFAULT_SETTINGS.exercises.row.progression
          }
        }
      };
      await saveSettings();

      // Do NOT overwrite progress - settings save only changes settings
      showToast('Settings saved!');
    });

    document.getElementById('reset-progress-btn').addEventListener('click', async () => {
      if (confirm('Reset all exercise weights to starting weights?')) {
        const progress = {
          squat: { weight: parseFloat(document.getElementById('squat-start').value) || DEFAULT_SETTINGS.exercises.squat.startingWeight },
          press: { weight: parseFloat(document.getElementById('press-start').value) || DEFAULT_SETTINGS.exercises.press.startingWeight },
          deadlift: { weight: parseFloat(document.getElementById('deadlift-start').value) || DEFAULT_SETTINGS.exercises.deadlift.startingWeight },
          row: { weight: parseFloat(document.getElementById('row-start').value) || DEFAULT_SETTINGS.exercises.row.startingWeight }
        };
        await fetch('/api/progress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(progress)
        });
        showToast('Progress reset!');
      }
    });

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (confirm('Reset all settings to defaults?')) {
        settings = { ...DEFAULT_SETTINGS, plates: [...DEFAULT_SETTINGS.plates], exercises: JSON.parse(JSON.stringify(DEFAULT_SETTINGS.exercises)) };
        await saveSettings();
        populateForm();
        showToast('Settings reset!');
      }
    });

    // Initialize
    (async () => {
      await loadSettings();
      await loadProgress();
      populateForm();
    })();
  </script>
</body>
</html>
